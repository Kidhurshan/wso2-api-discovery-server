# Default values for the ads chart.
#
# Two install modes:
#
#   1. Bundled (default) — postgresql.enabled = true. The chart pulls in
#      Bitnami's postgresql subchart and provisions a single-replica
#      Postgres alongside ADS. One-shot install, ideal for demos / small
#      production / on-prem.
#
#   2. External — set postgresql.enabled = false and point database.host
#      at your existing managed Postgres (RDS, Cloud SQL, in-cluster
#      Postgres operator). The subchart is skipped entirely.
#
# Override with -f values-bundled.yaml or -f values-external.yaml.

image:
  repository: ghcr.io/Kidhurshan/wso2-api-discovery-server
  tag: "1.0.0"
  pullPolicy: IfNotPresent

namespace: governance
replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Bundled Postgres (Bitnami subchart). Disable to use an external Postgres.
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: ads
    database: ads
    # Leave existingSecret empty to let Bitnami auto-generate a password
    # into <release>-postgresql secret. Operators who want a stable known
    # password should pre-create a secret and set existingSecret here.
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 10Gi
      # storageClass: ""   # uncomment + set if cluster has no default
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  # Lock down: only ADS pods in the same namespace should reach Postgres.
  # The Bitnami chart exposes a ClusterIP service named <release>-postgresql
  # on port 5432; no NodePort, no LoadBalancer.
  service:
    type: ClusterIP

# ---------------------------------------------------------------------------
# Database wiring. When postgresql.enabled = true, host/port/user/name are
# resolved from the subchart and these values are ignored. When disabled,
# operators MUST populate host/port and either passwordSecret or set
# ADS_DB_PASSWORD via the ads-secrets Secret.
# ---------------------------------------------------------------------------
database:
  host: ""             # external mode: e.g. postgres.prod.svc.cluster.local
  port: 5432
  name: ads
  user: ads
  sslmode: disable     # external mode: typically "require" or "verify-full"
  # Reference an existing Secret (key = "password") instead of putting the
  # password in the auto-generated ads-secrets. Useful with external-secrets
  # / SealedSecrets / Vault.
  passwordSecret: ""

# ---------------------------------------------------------------------------
# TLS for the BFF endpoint.
#   autoGenerate = true (default) renders a self-signed cert via Helm's
#   genSelfSignedCert template into a kubernetes.io/tls Secret named
#   <release>-ads-tls. Survives helm upgrade through a `lookup` guard.
#
#   For production with a real CA, set existingSecret to the name of a
#   Secret you already manage (e.g. one created by cert-manager).
# ---------------------------------------------------------------------------
tls:
  autoGenerate: true
  existingSecret: ""        # if set, autoGenerate is ignored

# DeepFlow — reach via the deepflow-server NodePort or ClusterIP. Use the
# querier API (port 20416), NOT direct ClickHouse.
deepflow:
  enabled: true
  url: http://deepflow-server.deepflow.svc.cluster.local:20416
  user: default

# WSO2 APIM Publisher.
apim:
  publisherURL: https://apim.wso2.svc.cluster.local:9443
  serviceAccountUsername: ads-service
  introspectURL: https://apim.wso2.svc.cluster.local:9443/oauth2/introspect

# Cycle cadence (minutes).
discovery:
  pollInterval: 5
  windowMinutes: 5
  skipInternal: true

managed:
  pollInterval: 10
  fetchConcurrency: 5

# Retention.
retention:
  classificationsDays: 90
  discoveredAPIsDays: 30
