apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ads.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ads.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ads.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ads.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ads.fullname" . }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: ads
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8443
              name: bff
            - containerPort: 9090
              name: health
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ADS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ads.dbPasswordSecret" . }}
                  key: {{ include "ads.dbPasswordKey" . }}
            - name: APIM_SVC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ads.fullname" . }}-secrets
                  key: apim_svc_password
            - name: APIM_INTROSPECT_BASIC_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "ads.fullname" . }}-secrets
                  key: apim_introspect_basic
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/ads/config.toml
              subPath: config.toml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "ads.fullname" . }}-config
