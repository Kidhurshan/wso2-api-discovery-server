apiVersion: v1
kind: Service
metadata:
  name: {{ include "ads.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ads.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ads.selectorLabels" . | nindent 4 }}
  ports:
    - name: bff
      port: 8443
      targetPort: bff
    - name: health
      port: 9090
      targetPort: health
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ads.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ads.labels" . | nindent 4 }}
