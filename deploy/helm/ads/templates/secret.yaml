# Secret with placeholder values. Operators MUST `kubectl edit` (or
# manage via SealedSecrets / Vault / external-secrets) to populate
# real credentials before the daemon will boot.

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ads.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ads.labels" . | nindent 4 }}
type: Opaque
data:
  db_password:           ""
  apim_svc_password:     ""
  apim_introspect_basic: ""
