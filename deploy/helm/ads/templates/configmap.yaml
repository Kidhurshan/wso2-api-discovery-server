apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ads.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ads.labels" . | nindent 4 }}
data:
  config.toml: |
    [ads]
    name      = "wso2-api-discovery-server"
    version   = {{ .Chart.AppVersion | quote }}
    log_level = "info"

    [database]
    host                    = {{ .Values.database.host | quote }}
    port                    = {{ .Values.database.port }}
    name                    = {{ .Values.database.name | quote }}
    user                    = {{ .Values.database.user | quote }}
    password                = "${ADS_DB_PASSWORD}"
    sslmode                 = {{ .Values.database.sslmode | quote }}
    max_open_conns          = 25
    max_idle_conns          = 5
    connect_timeout_seconds = 10

    [deepflow]
    enabled         = {{ .Values.deepflow.enabled }}
    clickhouse_url  = {{ .Values.deepflow.url | quote }}
    clickhouse_user = {{ .Values.deepflow.user | quote }}
    verify_ssl      = false
    timeout_seconds = 30

    [apim]
    publisher_url            = {{ .Values.apim.publisherURL | quote }}
    service_account_username = {{ .Values.apim.serviceAccountUsername | quote }}
    service_account_password = "${APIM_SVC_PASSWORD}"
    verify_ssl               = false
    timeout_seconds          = 30
    introspect_url           = {{ .Values.apim.introspectURL | quote }}
    introspect_basic_auth    = "${APIM_INTROSPECT_BASIC_AUTH}"

    [discovery]
    poll_interval_minutes     = {{ .Values.discovery.pollInterval }}
    window_minutes            = {{ .Values.discovery.windowMinutes }}
    status_min                = 200
    status_max                = 400
    skip_internal             = {{ .Values.discovery.skipInternal }}
    min_observations          = 1
    max_signatures_per_window = 10000

    [discovery.noise_filter]
    path_pattern = "^/(health|healthz|metrics|debug|favicon\\.ico|robots\\.txt|swagger|swagger-ui).*"
    ports        = [9090, 6443, 10250, 10251, 10252, 2379, 2380]
    domains      = ["kubernetes.default.svc", "kubernetes.default.svc.cluster.local"]

    [discovery.normalization_rules_meta]
    version = "v1"

    [[discovery.normalization_rules]]
    name        = "uuid_v4"
    pattern     = '/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "iso_date"
    pattern     = '/\d{4}-\d{2}-\d{2}(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "mongo_objectid"
    pattern     = '/[0-9a-f]{24}(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "customer_id"
    pattern     = '/CUST-[A-Z0-9]+(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "sku_pattern"
    pattern     = '/[A-Z]{3,}(?:-[A-Z0-9]+)+(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "numeric_id"
    pattern     = '/[0-9]+(/|$)'
    placeholder = '/{id}$1'

    [managed]
    poll_interval_minutes = {{ .Values.managed.pollInterval }}
    fetch_concurrency     = {{ .Values.managed.fetchConcurrency }}
    dns_cache_ttl_minutes = 5

    [comparison]
    freshness_threshold_multiplier = 3

    [deployment.topology]
    k8s_nodes     = {{ .Values.topology.k8sNodes | toJson }}
    legacy_chosts = {{ .Values.topology.legacyChosts | toJson }}

    [bff]
    listen_addr           = "0.0.0.0:8443"
    tls_cert              = "/etc/ads/certs/server.crt"
    tls_key               = "/etc/ads/certs/server.key"
    verify_client_cert    = false
    read_timeout_seconds  = 30
    write_timeout_seconds = 30

    [bff.token_cache]
    ttl_seconds = 30
    max_entries = 1000

    [health]
    listen_addr = "0.0.0.0:9090"

    [k8s]
    enabled   = true
    namespace = "${POD_NAMESPACE}"
    pod_name  = "${POD_NAME}"

    [retention]
    classifications_retention_days = {{ .Values.retention.classificationsDays }}
    discovered_apis_retention_days = {{ .Values.retention.discoveredAPIsDays }}
