# ConfigMap for the daemon's TOML config. Edit values for your
# environment, then `kubectl apply -f configmap.yaml`.
#
# Secrets (DB/APIM passwords, introspect basic-auth) come from the Secret
# in secret.yaml.template and are referenced via env var expansion in
# the config below.

apiVersion: v1
kind: ConfigMap
metadata:
  name: ads-config
  namespace: governance
data:
  config.toml: |
    [ads]
    name      = "wso2-api-discovery-server"
    version   = "1.0.0"
    log_level = "info"

    [database]
    host                    = "postgres.governance.svc.cluster.local"
    port                    = 5432
    name                    = "ads"
    user                    = "ads"
    password                = "${ADS_DB_PASSWORD}"
    sslmode                 = "require"
    max_open_conns          = 25
    max_idle_conns          = 5
    connect_timeout_seconds = 10

    [deepflow]
    enabled             = true
    clickhouse_url      = "http://deepflow-server.deepflow.svc.cluster.local:20416"
    clickhouse_user     = "default"
    clickhouse_password = "${DEEPFLOW_CH_PASSWORD:-}"
    verify_ssl          = false
    timeout_seconds     = 30

    [apim]
    publisher_url            = "https://apim.wso2.svc.cluster.local:9443"
    service_account_username = "ads-service"
    service_account_password = "${APIM_SVC_PASSWORD}"
    verify_ssl               = false
    timeout_seconds          = 30
    introspect_url           = "https://apim.wso2.svc.cluster.local:9443/oauth2/introspect"
    introspect_basic_auth    = "${APIM_INTROSPECT_BASIC_AUTH}"

    [discovery]
    poll_interval_minutes     = 5
    window_minutes            = 5
    status_min                = 200
    status_max                = 400
    skip_internal             = true
    min_observations          = 1
    max_signatures_per_window = 10000

    [discovery.noise_filter]
    path_pattern = "^/(health|healthz|metrics|debug|favicon\\.ico|robots\\.txt|swagger|swagger-ui).*"
    ports        = [9090, 6443, 10250, 10251, 10252, 2379, 2380]
    domains      = ["kubernetes.default.svc", "kubernetes.default.svc.cluster.local"]

    [discovery.normalization_rules_meta]
    version = "v1"

    [[discovery.normalization_rules]]
    name        = "uuid_v4"
    pattern     = '/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "iso_date"
    pattern     = '/\d{4}-\d{2}-\d{2}(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "mongo_objectid"
    pattern     = '/[0-9a-f]{24}(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "customer_id"
    pattern     = '/CUST-[A-Z0-9]+(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "sku_pattern"
    pattern     = '/[A-Z]{3,}(?:-[A-Z0-9]+)+(/|$)'
    placeholder = '/{id}$1'

    [[discovery.normalization_rules]]
    name        = "numeric_id"
    pattern     = '/[0-9]+(/|$)'
    placeholder = '/{id}$1'

    [managed]
    poll_interval_minutes  = 10
    fetch_concurrency      = 5
    dns_cache_ttl_minutes  = 5

    [comparison]
    freshness_threshold_multiplier = 3

    [deployment.topology]
    k8s_nodes     = []
    legacy_chosts = []

    [bff]
    listen_addr           = "0.0.0.0:8443"
    tls_cert              = "/etc/ads/certs/server.crt"
    tls_key               = "/etc/ads/certs/server.key"
    verify_client_cert    = false
    read_timeout_seconds  = 30
    write_timeout_seconds = 30

    [bff.token_cache]
    ttl_seconds = 30
    max_entries = 1000

    [health]
    listen_addr = "0.0.0.0:9090"

    [k8s]
    enabled   = true
    namespace = "${POD_NAMESPACE}"
    pod_name  = "${POD_NAME}"

    [retention]
    classifications_retention_days = 90
    discovered_apis_retention_days = 30
